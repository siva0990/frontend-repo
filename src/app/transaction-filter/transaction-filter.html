<div class ="filter-box">
    <h3>Filter Transactions</h3>

    <input type="text" 
    placeholder="account Number" 
    [ngModel]="filter().fromAccountNumber"
    (ngModelChange)="updateFromAccountNumber($event)">

    <br/>

    <input type="number"
    [ngModel]="filter().minAmount"
    placeholder="min amount"
    (ngModelChange)="updateMinAmount($event)">

    <input type="number"
    [ngModel]="filter().maxAmount"
    placeholder="max amount"
    (ngModelChange)="updateMaxAmount($event)">

    <button class="btn btn-danger" (click)="onClearFilter()">Clear Filter</button>

</div>
